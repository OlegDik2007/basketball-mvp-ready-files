services:
  api:
    build: ./backend
    container_name: basketball_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    depends_on:
      - redis

  worker:
    build: ./worker
    container_name: basketball_worker
    env_file:
      - .env
    restart: always
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: basketball_redis
    restart: always
    ports:
      - "6379:6379"
